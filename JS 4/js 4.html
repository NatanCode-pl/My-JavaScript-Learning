<!DOCTYPE html>
<html>

    <body>
        <div class="airport-app">
  <h2>✈️ Odprawa Bagażowa: Terminal 1</h2>
  
  <div class="input-box">
    <label>Waga walizki (w kg):</label>
    <input type="number" id="luggage-weight" min="0" value="0">
    <button id="check-luggage-btn">Zatwierdź wagę</button>
  </div>

  <div class="result-box">
    <p>Status: <span id="status-output">Oczekiwanie...</span></p>
    <p>Opłata za nadbagaż: <span id="fee-output">0</span> zł</p>
  </div>
</div>
<script src="js 4.js" defer></script>
    </body>
</html>
