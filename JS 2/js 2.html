<div class="security-panel">
  <h2>Panel Bezpieczeństwa Domu</h2>
  <p>Wprowadź kod PIN, aby uzyskać dostęp:</p>
  
  <input type="password" id="pin-input" placeholder="****">

  <div id="admin-box" class="hidden alert-success">Dostęp przyznany. Witaj w panelu zarządcy.</div>
</div>
