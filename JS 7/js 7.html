<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="js 7.css">
    </head>
    <body>
        <div class="booking-panel">
  <h2>🎭 System Rezerwacji biletów VIP</h2>
  
  <div class="form-group">
    <label>Strefa miejsc:</label>
    <select id="zone-select">
      <option value="standard">Standard (40 zł)</option>
      <option value="vip">VIP (90 zł)</option>
    </select>
  </div>

  <div class="form-group">
    <label>Liczba biletów (1 - 5):</label>
    <input type="number" id="ticket-quantity" value="1">
  </div>

  <div class="form-group">
    <label>Wiek głównego klienta:</label>
    <input type="number" id="client-age" value="25">
  </div>

  <button id="book-btn">Oblicz i Rezerwuj</button>

  <hr>

  <div class="summary-box">
    <p>Status zamówienia: <span id="booking-status">Brak rezerwacji</span></p>
    <p>Do zapłaty: <span id="total-cost">0</span> zł</p>
  </div>

  <div id="tickets-preview" class="tickets-container"></div>
</div>
<script src="js 7.js" defer></script>
    </body>
</html>
